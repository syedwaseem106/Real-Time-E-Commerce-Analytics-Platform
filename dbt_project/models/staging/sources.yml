version: 2

sources:
  - name: raw
    schema: staging
    tables:
      - name: stg_events
        description: "Raw transactional clickstream events staged by the Spark batch processor"
        columns:
          - name: event_id
            description: "Surrogate primary key of the click event"
            tests:
              - not_null
              - unique
          - name: user_id
            description: "Unique natural identifier of the browsing customer"
            tests:
              - not_null
          - name: session_id
            description: "Session identifier grouping user click sequences"
            tests:
              - not_null
          - name: event_type
            description: "Action type (view, cart addition, checkout, purchase)"
            tests:
              - not_null
              - accepted_values:
                  values: ['page_view', 'product_view', 'add_to_cart', 'remove_from_cart', 'checkout', 'purchase', 'payment']
          - name: product_id
            description: "Target catalog identifier"
            tests:
              - not_null
