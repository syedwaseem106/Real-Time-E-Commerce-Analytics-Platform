version: 2

models:
  - name: dim_users
    description: "Enriched e-commerce customers dimension containing lifetime transaction aggregations and HSL-based spend classifications."
    columns:
      - name: user_id
        description: "Natural unique customer identifier"
        tests:
          - not_null
          - unique
      - name: total_orders
        description: "Cumulative order count generated by customer"
        tests:
          - not_null
      - name: total_spend
        description: "Cumulative lifetime amount spent in USD"
        tests:
          - not_null
      - name: segment
        description: "Spend-based segment: VIP (>=500), Frequent Buyer (100-500), Bargain Hunter (<100), Regular (0)"
        tests:
          - not_null
          - accepted_values:
              values: ['VIP', 'Frequent Buyer', 'Bargain Hunter', 'Regular']

  - name: dim_products
    description: "Enriched product dimension containing subcategories, brands, prices, and cumulative visibility metrics."
    columns:
      - name: product_id
        description: "Natural unique product identifier"
        tests:
          - not_null
          - unique
      - name: base_price
        description: "Base catalog price"
        tests:
          - not_null

  - name: fact_orders
    description: "Clean purchase order transactions staging user keys, product keys, and transaction amounts."
    columns:
      - name: event_id
        description: "Unique event transaction identifier"
        tests:
          - not_null
          - unique
      - name: user_id
        description: "Associated customer key"
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: product_id
        description: "Associated product catalog key"
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: order_amount
        description: "Sale value of order transaction"
        tests:
          - not_null

  - name: mart_daily_sales
    description: "Daily reporting rollups computing order volumes, running revenues, and DOD growth metrics."
    columns:
      - name: order_date
        description: "Reporting date"
        tests:
          - not_null
          - unique
      - name: total_revenue
        description: "Combined sales for date"
        tests:
          - not_null

  - name: mart_conversion_funnel
    description: "Daily session conversion funnel detailing drop-off rates at individual stages."
    columns:
      - name: event_date
        description: "Analytics date"
        tests:
          - not_null
          - unique
